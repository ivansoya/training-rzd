# API gateway: serves the SPA and routes /api/* to the backend microservices.
# This is the only externally exposed port.
server {
    listen 80;
    server_name _;

    # allow arbitrarily large dataset / video uploads (0 = no limit)
    client_max_body_size 0;
    client_body_timeout 1800s;

    root /usr/share/nginx/html;
    index index.html;

    # shared proxy settings (inherited by locations that don't redefine them)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # stream large uploads straight to the service instead of buffering to disk
    proxy_request_buffering off;
    proxy_read_timeout 1800s;
    proxy_send_timeout 1800s;

    # --- Server-Sent Events: live training progress (must not buffer).
    #     A regex location wins over the /api/trainings prefix below. ---
    location ~ ^/api/trainings/[^/]+/stream$ {
        proxy_pass http://training:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # --- training service (training, models, devices, inference, videos) ---
    location /api/trainings { proxy_pass http://training:5000; }
    location /api/models    { proxy_pass http://training:5000; }
    location /api/devices   { proxy_pass http://training:5000; }
    location /api/inference { proxy_pass http://training:5000; }
    location /api/videos    { proxy_pass http://training:5000; }
    location = /api/health  { proxy_pass http://training:5000; }

    # --- augmentation service (configs, preview, generate) ---
    location /api/aug { proxy_pass http://augmentation:5000; }

    # --- datasets service (datasets + background jobs + disk usage) ---
    location /api/datasets { proxy_pass http://datasets:5000; }
    location /api/jobs     { proxy_pass http://datasets:5000; }
    location /api/storage  { proxy_pass http://datasets:5000; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
