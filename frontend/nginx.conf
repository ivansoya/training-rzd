server {
    listen 80;
    server_name _;

    # allow arbitrarily large dataset archive uploads (0 = no limit). A limit
    # here would reset the connection mid-upload and surface as "Failed to fetch".
    client_max_body_size 0;
    client_body_timeout 1800s;

    root /usr/share/nginx/html;
    index index.html;

    # Server-Sent Events stream for live training progress. Buffering must be
    # off so events reach the browser the instant the backend emits them.
    # (regex location wins over the /api/ prefix below.)
    location ~ ^/api/trainings/[^/]+/stream$ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # proxy API calls to the Flask backend service
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # stream the body straight to the backend instead of buffering the whole
        # (potentially multi-GB) upload to disk first
        proxy_request_buffering off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
