# Microservices: three backend services share the yolo-data volume; the frontend
# nginx is the single externally exposed port (8080) and routes /api/* to them.
services:
  datasets:
    build:
      context: ./backend
      dockerfile: datasets_svc/Dockerfile
    container_name: yolo-datasets
    restart: unless-stopped
    volumes:
      - yolo-data:/app/data
    expose:
      - "5000"

  augmentation:
    build:
      context: ./backend
      dockerfile: augment_svc/Dockerfile
    container_name: yolo-augmentation
    restart: unless-stopped
    volumes:
      - yolo-data:/app/data
    expose:
      - "5000"

  training:
    build:
      context: ./backend
      dockerfile: training_svc/Dockerfile
      args:
        # CPU torch by default; the GPU override switches this to a CUDA wheel.
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
    container_name: yolo-training
    restart: unless-stopped
    # PyTorch DataLoader workers exchange batches through /dev/shm.
    shm_size: "2gb"
    volumes:
      - yolo-data:/app/data
    expose:
      - "5000"

  frontend:
    build: ./frontend
    container_name: yolo-frontend
    restart: unless-stopped
    depends_on:
      - datasets
      - augmentation
      - training
    ports:
      - "8080:80"

volumes:
  # Named volume (ext4 inside the VM) shared by all services — fast I/O and
  # reliable cross-container reads. Survives rebuilds and `down`; `down -v` wipes.
  yolo-data:
