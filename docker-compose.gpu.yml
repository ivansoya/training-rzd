# GPU override. Use together with the base compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Only the training service needs the GPU; the datasets and augmentation
# services stay on CPU images.
services:
  training:
    build:
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu121
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
